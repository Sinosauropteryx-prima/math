<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページ結合</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1"></script> <!-- PDFライブラリの読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    <style>
        @font-face {
            font-family: 'annzumoji';
            src: url('https://sinosauropteryx-prima.github.io/math/annzumoji.ttf') format('truetype');
        }
        * {
            font-family: 'annzumoji';
        }
        body {
            padding-left: 10px;
        }
        h3 {
            font-size: 19px;
        }
        a {
            text-decoration: none;
            color: black;
            background: #bfcae7;
            padding: 3px 6px;
            border: none;
            border-radius: 15px;
            margin-right: 5px;
        }
        #file-input, #file-input-2 {
            display: none;
        }
        .pdfChoose {
            border: 1px solid #909090;
            border-radius: 10px;
            padding: 3px 8px;
            background: #f7f5e4;
            font-size: 15px;
            color: black;
        }
        #merge-button{
            font-size: 13px;
            background: #dbdbdb;
            border: none;
            border-radius: 10px;
            padding: 2px 7px;
        }
        .file-names {
            display: inline-block;
            margin: 0px;
        }
        input[type=number]{
            outline: none;
            width: 40px;
            margin-right: 5px;

        }
        input[type="number"]::-webkit-outer-spin-button, 
        input[type="number"]::-webkit-inner-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        .numberChange {
            outline: none;
            border-radius: 10px;
            border: none;
            background: #c2e7e7;
            width: 20px;
            padding: 0px;
            height: 20px;
        }
        p input:nth-child(2) {
            margin-left: 5px;
        }
        div#checkbox-container input, .direction input, .border-option input {
            height: 10px;
            margin-right: 0px;
        }
        div#checkbox-container label, .direction label, .border-option label {
            font-size: 15px;
        }
        #checkbox-container, .direction, .border-option {
            margin-bottom: 15px;
        }
        #checkbox-container p, .direction p, .border-option p {
            font-size: 13px;
            margin: 13px 0px 8px 0px;
        }
        .space_page {
            font-size: 13px;
            margin: 25px 0px 8px 0px;
        }
        p:has( > #space_padding) {
            margin-top: 0px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <h3><a href="https://sinosauropteryx-prima.github.io/math/目次.html">←</a>PDFページ結合</h3>
    
    <div class="deco-file">
        <input type="file" id="file-input" accept="application/pdf" > <!-- PDFファイルの選択入力1 -->
        <label class="pdfChoose" for="file-input">1つ目のpdfを選択</label>
        <p class="file-names"></p>
    </div>
    <div class="deco-file" style="margin-top: 10px;">
        <input type="file" id="file-input-2" accept="application/pdf" > <!-- PDFファイルの選択入力2 -->
        <label class="pdfChoose" for="file-input-2">2つ目のpdfを選択 (任意)</label>
        <p class="file-names"></p>
    </div>
    <p class="space_page">○ページ間の距離</p>
    <p><input type="number" id="space_padding" value="0">mm<input type="button" class="numberChange" onclick="++document.getElementById('space_padding').valueAsNumber" value="▲"><input type="button" class="numberChange" onclick="--document.getElementById('space_padding').valueAsNumber" value="▼"></p> <!-- 空白の幅をミリメートルで指定 -->
    
    <div id="checkbox-container" style="display: none;">
        <p>○単独で表示 または 空白で埋める</p>
        <input type="radio" id="first-page" name="page-option" checked> <!-- 最初のページチェックボックス -->
        <label for="first-page">最初のページ</label>
        <input type="radio" id="last-page" name="page-option"> <!-- 最後のページチェックボックス -->
        <label for="last-page">最後のページ</label>
        <input type="checkbox" id="blank-page" /> <!-- 空白ページチェックボックス -->
        <label for="blank-page">空白</label>
    </div>
    <div class="direction">
        <p>○結合の方向</p>
        <input type="radio" id="vertical" name="page-direction">
        <label for="vertical">縦</label>
        <input type="radio" id="horizontal" name="page-direction" checked>
        <label for="horizontal">横</label>
    </div>
    <div class="border-option">
        <p>○境界線</p>
        <input type="checkbox" id="show-border" /> <!-- 境界線チェックボックス -->
        <label for="show-border">中央に境界線を引く (0.5pt)</label>
    </div>
    
    <button id="merge-button">結合</button> <!-- 結合ボタン -->
    <script>
        //ファイル名を表示する
        document.querySelectorAll('.deco-file input[type=file]').forEach(function(){
            this.addEventListener('change',function(e){
                let parent = e.target.closest('.deco-file');
                parent.querySelector('.file-names').innerHTML='';
                for (file of e.target.files) {
                    parent.querySelector('.file-names').insertAdjacentHTML('beforeend',file.name+"<br>");
                }
            })
        })
    
        // mm（ミリメートル）をポイントに変換する関数
        function mmToPoints(mm) {
            return mm * 2.83465; // 1mm = 2.83465ポイントに変換
        }

        // ページの物理サイズと回転（Rotate）を検出し、表示上のサイズ情報を計算する関数
        function getPageInfo(page) {
            const unrotatedSize = page.getSize();
            const rotation = page.getRotation().angle; // 0, 90, 180, 270
            const isFlipped = (rotation / 90) % 2 !== 0; // 90度または270度のときは縦横が反転する
            return {
                unrotatedSize,
                rotation,
                width: isFlipped ? unrotatedSize.height : unrotatedSize.width,
                height: isFlipped ? unrotatedSize.width : unrotatedSize.height
            };
        }

        // 回転方向と座標ズレを補正しながら、新ページに描画する関数
        function drawPageWithRotation(targetPage, embeddedPage, targetX, targetY, pageInfo) {
            const { unrotatedSize, rotation } = pageInfo;
            let drawX = targetX;
            let drawY = targetY;

            // pdf-libは原点を左下(0,0)として描画するため、回転を加えたときの原点のズレを相殺する
            if (rotation === 90) {
                drawX = targetX;
                drawY = targetY + unrotatedSize.width;
            } else if (rotation === 180) {
                drawX = targetX + unrotatedSize.width;
                drawY = targetY + unrotatedSize.height;
            } else if (rotation === 270) {
                drawX = targetX + unrotatedSize.height;
                drawY = targetY;
            }

            targetPage.drawPage(embeddedPage, {
                x: drawX,
                y: drawY,
                rotate: PDFLib.degrees(-rotation) // 時計回りに回転（PDFLibの仕様上マイナス値で指定）
            });
        }

        // 境界線（中央線）を描画する関数
        function drawCenterLine(page, vertical, width, height, firstSize, spacePadding) {
            const color = PDFLib.rgb(175 / 255, 179 / 255, 176 / 255); // #afb3b0
            const thickness = 0.5;

            if (vertical) {
                // 縦並び：中央に平行（水平）な線
                const y = height - firstSize.height - spacePadding / 2;
                page.drawLine({
                    start: { x: 0, y: y },
                    end: { x: width, y: y },
                    thickness: thickness,
                    color: color
                });
            } else {
                // 横並び：中央に垂直な線
                const x = firstSize.width + spacePadding / 2;
                page.drawLine({
                    start: { x: x, y: 0 },
                    end: { x: x, y: height },
                    thickness: thickness,
                    color: color
                });
            }
        }

        // オプション表示の切り替え
        async function updateCheckboxVisibility() {
            const fileInput = document.getElementById('file-input');
            const fileInput2 = document.getElementById('file-input-2');
            const file = fileInput.files[0];
            const file2 = fileInput2.files[0];
            const container = document.getElementById('checkbox-container');

            if (file && file2) {
                const arrayBuffer1 = await file.arrayBuffer();
                const pdfDoc1 = await PDFLib.PDFDocument.load(arrayBuffer1);
                const pageCount1 = pdfDoc1.getPageCount();

                const arrayBuffer2 = await file2.arrayBuffer();
                const pdfDoc2 = await PDFLib.PDFDocument.load(arrayBuffer2);
                const pageCount2 = pdfDoc2.getPageCount();

                // 2つのPDFのページ数が異なる場合、足りないページをどう埋めるかのオプションを表示
                if (pageCount1 !== pageCount2) {
                    container.style.display = 'block';
                } else {
                    container.style.display = 'none';
                }
            } else if (file) {
                const arrayBuffer = await file.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const pageCount = pdfDoc.getPageCount();

                // ページ数が奇数の場合、チェックボックスを表示
                if (pageCount % 2 === 1) {
                    container.style.display = 'block';
                } else {
                    container.style.display = 'none';
                }
            } else {
                container.style.display = 'none';
            }
        }

        document.getElementById('file-input').addEventListener('change', updateCheckboxVisibility);
        document.getElementById('file-input-2').addEventListener('change', updateCheckboxVisibility);

        // 結合ボタンがクリックされた時の処理
        document.getElementById('merge-button').addEventListener('click', async () => {
            const fileInput = document.getElementById('file-input'); // ファイル入力要素を取得
            const fileInput2 = document.getElementById('file-input-2'); // 2つ目のファイル入力要素を取得
            const file = fileInput.files[0]; // 選択されたファイル1を取得
            const file2 = fileInput2.files[0]; // 選択されたファイル2を取得

            // PDFファイルが選択されていない場合のエラーメッセージ
            if (!file) {
                alert("少なくとも1つ目のPDFファイルを選択してください。"); // 警告ダイアログを表示
                return; // 処理を中止
            }

            const mergedPdf = await PDFLib.PDFDocument.create(); // 新しいPDFドキュメントを作成
            const spacePadding = mmToPoints(document.getElementById('space_padding').valueAsNumber); // ミリメートルをポイントに変換

            // チェックボックスの状態を取得
            const firstPageChecked = document.getElementById('first-page').checked; // 最初のページのチェック状態
            const lastPageChecked = document.getElementById('last-page').checked; // 最後のページのチェック状態
            const blankPageChecked = document.getElementById('blank-page').checked; // 空白のチェック状態

            const verticalChecked = document.getElementById('vertical').checked; // 縦のチェック状態
            const showBorderChecked = document.getElementById('show-border').checked; // 境界線のチェック状態

            // 2つのPDFが選択されている場合、交互に結合する
            if (file && file2) {
                const arrayBuffer1 = await file.arrayBuffer();
                const pdfDoc1 = await PDFLib.PDFDocument.load(arrayBuffer1);
                const pageCount1 = pdfDoc1.getPageCount();

                const arrayBuffer2 = await file2.arrayBuffer();
                const pdfDoc2 = await PDFLib.PDFDocument.load(arrayBuffer2);
                const pageCount2 = pdfDoc2.getPageCount();

                const maxPageCount = Math.max(pageCount1, pageCount2);

                for (let i = 0; i < maxPageCount; i++) {
                    const hasPage1 = i < pageCount1;
                    const hasPage2 = i < pageCount2;

                    if (hasPage1 && hasPage2) {
                        const page1 = pdfDoc1.getPage(i);
                        const embeddedPage1 = await mergedPdf.embedPage(page1);
                        const pageInfo1 = getPageInfo(page1);

                        const page2 = pdfDoc2.getPage(i);
                        const embeddedPage2 = await mergedPdf.embedPage(page2);
                        const pageInfo2 = getPageInfo(page2);

                        if (verticalChecked) { // 縦に結合
                            const mergedWidth = Math.max(pageInfo1.width, pageInfo2.width);
                            const mergedHeight = pageInfo1.height + spacePadding + pageInfo2.height;
                            const mergedPage = mergedPdf.addPage([mergedWidth, mergedHeight]);

                            const page1X = (mergedWidth - pageInfo1.width) / 2;
                            drawPageWithRotation(mergedPage, embeddedPage1, page1X, pageInfo2.height + spacePadding, pageInfo1);

                            const page2X = (mergedWidth - pageInfo2.width) / 2;
                            drawPageWithRotation(mergedPage, embeddedPage2, page2X, 0, pageInfo2);

                            if (showBorderChecked) {
                                drawCenterLine(mergedPage, true, mergedWidth, mergedHeight, pageInfo1, spacePadding);
                            }
                        } else { // 横に結合
                            const mergedWidth = pageInfo1.width + spacePadding + pageInfo2.width;
                            const mergedHeight = Math.max(pageInfo1.height, pageInfo2.height);
                            const mergedPage = mergedPdf.addPage([mergedWidth, mergedHeight]);

                            const page1Y = (mergedHeight - pageInfo1.height) / 2;
                            drawPageWithRotation(mergedPage, embeddedPage1, 0, page1Y, pageInfo1);

                            const page2Y = (mergedHeight - pageInfo2.height) / 2;
                            drawPageWithRotation(mergedPage, embeddedPage2, pageInfo1.width + spacePadding, page2Y, pageInfo2);

                            if (showBorderChecked) {
                                drawCenterLine(mergedPage, false, mergedWidth, mergedHeight, pageInfo1, spacePadding);
                            }
                        }
                    } else if (hasPage1) { // 1つ目のPDFのみページが存在する場合
                        const page1 = pdfDoc1.getPage(i);
                        const embeddedPage1 = await mergedPdf.embedPage(page1);
                        const pageInfo1 = getPageInfo(page1);

                        if (blankPageChecked) { // 空白と結合
                            if (verticalChecked) {
                                const mergedPage = mergedPdf.addPage([pageInfo1.width, pageInfo1.height * 2 + spacePadding]);
                                drawPageWithRotation(mergedPage, embeddedPage1, 0, pageInfo1.height + spacePadding, pageInfo1);
                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, true, pageInfo1.width, pageInfo1.height * 2 + spacePadding, pageInfo1, spacePadding);
                                }
                            } else {
                                const mergedPage = mergedPdf.addPage([pageInfo1.width * 2 + spacePadding, pageInfo1.height]);
                                drawPageWithRotation(mergedPage, embeddedPage1, 0, 0, pageInfo1);
                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, false, pageInfo1.width * 2 + spacePadding, pageInfo1.height, pageInfo1, spacePadding);
                                }
                            }
                        } else { // 単独で表示
                            const mergedPage = mergedPdf.addPage([pageInfo1.width, pageInfo1.height]);
                            drawPageWithRotation(mergedPage, embeddedPage1, 0, 0, pageInfo1);
                        }
                    } else if (hasPage2) { // 2つ目のPDFのみページが存在する場合
                        const page2 = pdfDoc2.getPage(i);
                        const embeddedPage2 = await mergedPdf.embedPage(page2);
                        const pageInfo2 = getPageInfo(page2);

                        if (blankPageChecked) { // 空白と結合
                            if (verticalChecked) {
                                const mergedPage = mergedPdf.addPage([pageInfo2.width, pageInfo2.height * 2 + spacePadding]);
                                drawPageWithRotation(mergedPage, embeddedPage2, 0, 0, pageInfo2);
                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, true, pageInfo2.width, pageInfo2.height * 2 + spacePadding, pageInfo2, spacePadding);
                                }
                            } else {
                                const mergedPage = mergedPdf.addPage([pageInfo2.width * 2 + spacePadding, pageInfo2.height]);
                                drawPageWithRotation(mergedPage, embeddedPage2, pageInfo2.width + spacePadding, 0, pageInfo2);
                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, false, pageInfo2.width * 2 + spacePadding, pageInfo2.height, pageInfo2, spacePadding);
                                }
                            }
                        } else { // 単独で表示
                            const mergedPage = mergedPdf.addPage([pageInfo2.width, pageInfo2.height]);
                            drawPageWithRotation(mergedPage, embeddedPage2, 0, 0, pageInfo2);
                        }
                    }
                }
            } else {
                // 1つのPDFが選択されている場合（従来通りの処理）
                const arrayBuffer = await file.arrayBuffer(); // ファイルをArrayBufferとして読み込む
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer); // PDFドキュメントを読み込む
                const pageCount = pdfDoc.getPageCount(); // ページ数を取得

                // ページ数が2未満の場合のエラーメッセージ
                if (pageCount < 2) {
                    alert("選択したPDFには少なくとも2ページが必要です。"); // 警告ダイアログを表示
                    return; // 処理を中止
                }

                // 奇数ページの場合の処理
                if (pageCount % 2 === 1) {

                    // 最初のページがチェックされた場合
                    if (firstPageChecked) {
                        const originalFirstPage = pdfDoc.getPage(0); // 最初のページを取得
                        const embeddedOriginalFirstPage = await mergedPdf.embedPage(originalFirstPage); // ページを埋め込む
                        const firstPageInfo = getPageInfo(originalFirstPage); // 最初のページのサイズ情報を取得

                        // 空白がチェックされている場合
                        if (blankPageChecked) {
                            // 空白を含む最初のページを追加
                            if(verticalChecked){ // 縦がチェックされている場合
                                const mergedPage = mergedPdf.addPage([firstPageInfo.width, firstPageInfo.height*2 + spacePadding]); // マージページを追加
                                drawPageWithRotation(mergedPage, embeddedOriginalFirstPage, 0, 0, firstPageInfo);
                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, true, firstPageInfo.width, firstPageInfo.height*2 + spacePadding, firstPageInfo, spacePadding);
                                }
                            } else { // 横がチェックされている場合
                                const mergedPage = mergedPdf.addPage([firstPageInfo.width*2 + spacePadding, firstPageInfo.height]); // マージページを追加
                                drawPageWithRotation(mergedPage, embeddedOriginalFirstPage, firstPageInfo.width + spacePadding, 0, firstPageInfo);
                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, false, firstPageInfo.width*2 + spacePadding, firstPageInfo.height, firstPageInfo, spacePadding);
                                }
                            }
                        } else {
                            // 最初のページを追加
                            const mergedPage = mergedPdf.addPage([firstPageInfo.width, firstPageInfo.height]); // マージページを追加
                            drawPageWithRotation(mergedPage, embeddedOriginalFirstPage, 0, 0, firstPageInfo);
                        }

                        // 最初のページを除き、それ以降を2枚ずつ結合
                        for (let i = 1; i < pageCount; i += 2) {
                            const firstPage = pdfDoc.getPage(i); // 現在のページを取得
                            const embeddedFirstPage = await mergedPdf.embedPage(firstPage); // ページを埋め込む
                            const firstPageInfo = getPageInfo(firstPage); // 現在のページのサイズ情報を取得

                            const secondPage = pdfDoc.getPage(i + 1); // 次のページを取得
                            const embeddedSecondPage = await mergedPdf.embedPage(secondPage); // ページを埋め込む
                            const secondPageInfo = getPageInfo(secondPage); // 次のページのサイズ情報を取得

                            if(verticalChecked){ // 縦がチェックされている場合
                                const mergedWidth = Math.max(firstPageInfo.width, secondPageInfo.width); // マージページの幅を計算
                                const mergedHeight = firstPageInfo.height + spacePadding + secondPageInfo.height; // マージページの高さを計算
                                const mergedPage = mergedPdf.addPage([mergedWidth, mergedHeight]); // マージページを追加

                                // 各ページのX座標を計算して中央に配置
                                const firstPageX = (mergedWidth - firstPageInfo.width) / 2; // 最初のページのX座標を計算
                                drawPageWithRotation(mergedPage, embeddedFirstPage, firstPageX, secondPageInfo.height + spacePadding, firstPageInfo); // 最初のページを描画

                                const secondPageX = (mergedWidth - secondPageInfo.width) / 2; // 次のページのX座標を計算
                                drawPageWithRotation(mergedPage, embeddedSecondPage, secondPageX, 0, secondPageInfo); // 次のページを描画

                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, true, mergedWidth, mergedHeight, firstPageInfo, spacePadding);
                                }
                            } else { // 横がチェックされている場合
                                const mergedWidth = firstPageInfo.width + spacePadding + secondPageInfo.width; // マージページの幅を計算
                                const mergedHeight = Math.max(firstPageInfo.height, secondPageInfo.height); // マージページの高さを計算
                                const mergedPage = mergedPdf.addPage([mergedWidth, mergedHeight]); // マージページを追加

                                // 各ページのY座標を計算して中央に配置
                                const firstPageY = (mergedHeight - firstPageInfo.height) / 2; // 最初のページのY座標を計算
                                drawPageWithRotation(mergedPage, embeddedFirstPage, 0, firstPageY, firstPageInfo); // 最初のページを描画

                                const secondPageY = (mergedHeight - secondPageInfo.height) / 2; // 次のページのY座標を計算
                                drawPageWithRotation(mergedPage, embeddedSecondPage, firstPageInfo.width + spacePadding, secondPageY, secondPageInfo); // 次のページを描画

                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, false, mergedWidth, mergedHeight, firstPageInfo, spacePadding);
                                }
                            }
                        }
                    } 
                    // 最後のページがチェックされた場合
                    else if (lastPageChecked) {
                        // 2ページずつ結合
                        for (let i = 0; i < pageCount - 1; i += 2) {
                            const firstPage = pdfDoc.getPage(i); // 現在のページを取得
                            const embeddedFirstPage = await mergedPdf.embedPage(firstPage); // ページを埋め込む
                            const firstPageInfo = getPageInfo(firstPage); // 現在のページのサイズ情報を取得

                            const secondPage = pdfDoc.getPage(i + 1); // 次のページを取得
                            const embeddedSecondPage = await mergedPdf.embedPage(secondPage); // ページを埋め込む
                            const secondPageInfo = getPageInfo(secondPage); // 次のページのサイズ情報を取得

                            if(verticalChecked){ // 縦がチェックされている場合
                                const mergedWidth = Math.max(firstPageInfo.width, secondPageInfo.width); // マージページの幅を計算
                                const mergedHeight = firstPageInfo.height + spacePadding + secondPageInfo.height; // マージページの高さを計算
                                const mergedPage = mergedPdf.addPage([mergedWidth, mergedHeight]); // マージページを追加

                                // 各ページのX座標を計算して中央に配置
                                const firstPageX = (mergedWidth - firstPageInfo.width) / 2; // 最初のページのX座標を計算
                                drawPageWithRotation(mergedPage, embeddedFirstPage, firstPageX, secondPageInfo.height + spacePadding, firstPageInfo); // 最初のページを描画

                                const secondPageX = (mergedWidth - secondPageInfo.width) / 2; // 次のページのX座標を計算
                                drawPageWithRotation(mergedPage, embeddedSecondPage, secondPageX, 0, secondPageInfo); // 次のページを描画

                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, true, mergedWidth, mergedHeight, firstPageInfo, spacePadding);
                                }
                            } else { // 横がチェックされている場合
                                const mergedWidth = firstPageInfo.width + spacePadding + secondPageInfo.width; // マージページの幅を計算
                                const mergedHeight = Math.max(firstPageInfo.height, secondPageInfo.height); // マージページの高さを計算
                                const mergedPage = mergedPdf.addPage([mergedWidth, mergedHeight]); // マージページを追加

                                // 各ページのY座標を計算して中央に配置
                                const firstPageY = (mergedHeight - firstPageInfo.height) / 2; // 最初のページのY座標を計算
                                drawPageWithRotation(mergedPage, embeddedFirstPage, 0, firstPageY, firstPageInfo); // 最初のページを描画

                                const secondPageY = (mergedHeight - secondPageInfo.height) / 2; // 次のページのY座標を計算
                                drawPageWithRotation(mergedPage, embeddedSecondPage, firstPageInfo.width + spacePadding, secondPageY, secondPageInfo); // 次のページを描画

                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, false, mergedWidth, mergedHeight, firstPageInfo, spacePadding);
                                }
                            }
                        }

                        const lastPage = pdfDoc.getPage(pageCount - 1); // 最後のページを取得
                        const embeddedLastPage = await mergedPdf.embedPage(lastPage); // 最後のページを埋め込む
                        const lastPageInfo = getPageInfo(lastPage); // 最後のページのサイズ情報を取得

                        // 空白がチェックされている場合
                        if (blankPageChecked) {
                            // 空白を含む最後のページを追加
                            if(verticalChecked){ // 縦がチェックされている場合
                                const mergedPage = mergedPdf.addPage([lastPageInfo.width, lastPageInfo.height*2 + spacePadding]); // 最後のページを追加
                                drawPageWithRotation(mergedPage, embeddedLastPage, 0, 0, lastPageInfo); // 最後のページを描画
                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, true, lastPageInfo.width, lastPageInfo.height*2 + spacePadding, lastPageInfo, spacePadding);
                                }
                            } else { // 横がチェックされている場合
                                const mergedPage = mergedPdf.addPage([lastPageInfo.width*2 + spacePadding, lastPageInfo.height]); // 最後のページを追加
                                drawPageWithRotation(mergedPage, embeddedLastPage, 0, 0, lastPageInfo); // 最後のページを描画
                                if (showBorderChecked) {
                                    drawCenterLine(mergedPage, false, lastPageInfo.width*2 + spacePadding, lastPageInfo.height, lastPageInfo, spacePadding);
                                }
                            }
                        } else {
                            // 最後のページを追加
                            const mergedPage = mergedPdf.addPage([lastPageInfo.width, lastPageInfo.height]); // 最後のページを追加
                            drawPageWithRotation(mergedPage, embeddedLastPage, 0, 0, lastPageInfo); // 最後のページを描画
                        }

                    }
                } else {
                    // 偶数ページの場合、全ページを2枚ずつ結合
                    for (let i = 0; i < pageCount; i += 2) {
                        const firstPage = pdfDoc.getPage(i); // 現在のページを取得
                        const embeddedFirstPage = await mergedPdf.embedPage(firstPage); // ページを埋め込む
                        const firstPageInfo = getPageInfo(firstPage); // 現在のページのサイズ情報を取得

                        const secondPage = pdfDoc.getPage(i + 1); // 次のページを取得
                        const embeddedSecondPage = await mergedPdf.embedPage(secondPage); // ページを埋め込む
                        const secondPageInfo = getPageInfo(secondPage); // 次のページのサイズ情報を取得

                        if(verticalChecked){ // 縦がチェックされている場合
                            const mergedWidth = Math.max(firstPageInfo.width, secondPageInfo.width); // マージページの幅を計算
                            const mergedHeight = firstPageInfo.height + spacePadding + secondPageInfo.height; // マージページの高さを計算
                            const mergedPage = mergedPdf.addPage([mergedWidth, mergedHeight]); // マージページを追加

                            // 各ページのX座標を計算して中央に配置
                            const firstPageX = (mergedWidth - firstPageInfo.width) / 2; // 最初のページのX座標を計算
                            drawPageWithRotation(mergedPage, embeddedFirstPage, firstPageX, secondPageInfo.height + spacePadding, firstPageInfo); // 最初のページを描画

                            const secondPageX = (mergedWidth - secondPageInfo.width) / 2; // 次のページのX座標を計算
                            drawPageWithRotation(mergedPage, embeddedSecondPage, secondPageX, 0, secondPageInfo); // 次のページを描画

                            if (showBorderChecked) {
                                drawCenterLine(mergedPage, true, mergedWidth, mergedHeight, firstPageInfo, spacePadding);
                            }
                        } else { // 横がチェックされている場合
                            const mergedWidth = firstPageInfo.width + spacePadding + secondPageInfo.width; // マージページの幅を計算
                            const mergedHeight = Math.max(firstPageInfo.height, secondPageInfo.height); // マージページの高さを計算
                            const mergedPage = mergedPdf.addPage([mergedWidth, mergedHeight]); // マージページを追加

                            // 各ページのY座標を計算して中央に配置
                            const firstPageY = (mergedHeight - firstPageInfo.height) / 2; // 最初のページのY座標を計算
                            drawPageWithRotation(mergedPage, embeddedFirstPage, 0, firstPageY, firstPageInfo); // 最初のページを描画

                            const secondPageY = (mergedHeight - secondPageInfo.height) / 2; // 次のページのY座標を計算
                            drawPageWithRotation(mergedPage, embeddedSecondPage, firstPageInfo.width + spacePadding, secondPageY, secondPageInfo); // 次のページを描画

                            if (showBorderChecked) {
                                drawCenterLine(mergedPage, false, mergedWidth, mergedHeight, firstPageInfo, spacePadding);
                            }
                        }
                    }
                }
            }

            // PDFをバイナリ形式で保存
            const pdfBytes = await mergedPdf.save(); // マージされたPDFを保存
            const pdfBlob = new Blob([pdfBytes], { type: 'application/pdf' }); // Blobとして生成
            const pdfUrl = URL.createObjectURL(pdfBlob); // BlobのURLを生成
            window.open(pdfUrl, '_blank'); // 新しいタブでPDFを開く
        });
    </script>
</body>
</html>
